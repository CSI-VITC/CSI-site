<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#d946ef" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Neural Brain Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Brain Outer Contour -->
    <path d="M 50 25 C 38 25, 26 31, 26 46 C 26 56, 33 64, 48 67" />
    <path d="M 50 25 C 62 25, 74 31, 74 46 C 74 56, 67 64, 52 67" />
    <path d="M 50 25 V 67" stroke-dasharray="2 3" stroke-width="1.5" />
    
    <!-- Synaptic Nodes -->
    <circle cx="38" cy="38" r="3" fill="#d946ef" stroke="#ffffff" stroke-width="1.8" />
    <circle cx="62" cy="38" r="3" fill="#d946ef" stroke="#ffffff" stroke-width="1.8" />
    <circle cx="34" cy="52" r="3" fill="#d946ef" stroke="#ffffff" stroke-width="1.8" />
    <circle cx="66" cy="52" r="3" fill="#d946ef" stroke="#ffffff" stroke-width="1.8" />
    <circle cx="50" cy="58" r="3" fill="#ffffff" stroke="#d946ef" stroke-width="1.8" />

    <!-- Connectors -->
    <path d="M 38 38 L 50 58 M 62 38 L 50 58 M 34 52 L 50 58 M 66 52 L 50 58" stroke="#d946ef" stroke-width="1.8" opacity="0.8" />
  </g>
</svg>
