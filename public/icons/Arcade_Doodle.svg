<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#eab308" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Game Controller Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Controller contour -->
    <path d="M 27 34 C 27 25, 73 25, 73 34 C 73 42, 68 64, 59 64 C 51 64, 51 53, 49 53 C 47 53, 47 64, 39 64 C 30 64, 33 42, 27 34 Z" fill="#0f172a" opacity="0.25" />
    
    <!-- D-pad -->
    <path d="M 37 36 V 48 M 31 42 H 43" stroke="#eab308" stroke-width="3" />
    
    <!-- Buttons -->
    <circle cx="57" cy="39" r="2.8" fill="#eab308" stroke="#ffffff" stroke-width="1.8" />
    <circle cx="65" cy="45" r="2.8" fill="#eab308" stroke="#ffffff" stroke-width="1.8" />
  </g>
</svg>
