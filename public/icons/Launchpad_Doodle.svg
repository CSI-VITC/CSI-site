<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#94a3b8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Grid of apps Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Row 1 -->
    <rect x="30" y="28" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    <rect x="46" y="28" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    <rect x="62" y="28" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    
    <!-- Row 2 -->
    <rect x="30" y="44" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    <rect x="46" y="44" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2.2" fill="#94a3b8" />
    <rect x="62" y="44" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    
    <!-- Row 3 -->
    <rect x="30" y="60" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    <rect x="46" y="60" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
    <rect x="62" y="60" width="8" height="8" rx="2" stroke="#94a3b8" stroke-width="2" />
  </g>
</svg>
