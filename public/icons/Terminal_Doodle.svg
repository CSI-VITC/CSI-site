<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Terminal Screen Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Monitor Window -->
    <rect x="25" y="24" width="50" height="46" rx="5" />
    <!-- Header Line -->
    <path d="M 25 35 H 75" />
    <!-- Dots -->
    <circle cx="31" cy="30" r="1.2" fill="#ffffff" stroke="none" />
    <circle cx="37" cy="30" r="1.2" fill="#ffffff" stroke="none" opacity="0.6" />
    <circle cx="43" cy="30" r="1.2" fill="#ffffff" stroke="none" opacity="0.4" />
    <!-- Code prompt symbols -->
    <path d="M 34 45 L 42 50 L 34 55" stroke="#10b981" stroke-width="3" />
    <path d="M 46 55 H 56" stroke="#10b981" stroke-width="3" />
  </g>
</svg>
