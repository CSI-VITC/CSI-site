<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#f43f5e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Ticket Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Ticket Body shape with circular punchouts -->
    <path d="M 28 35 C 28 41, 33 44, 33 48 C 33 52, 28 55, 28 61 H 72 C 72 55, 67 52, 67 48 C 67 44, 72 41, 72 35 Z" />
    <!-- Dashed separator -->
    <path d="M 40 35 V 61" stroke="#f43f5e" stroke-width="2" stroke-dasharray="3 3" />
    <!-- Star in center -->
    <path d="M 54 41 L 56 45 L 60 46 L 57 49 L 58 53 L 54 51 L 50 53 L 51 49 L 48 46 L 52 45 Z" stroke="#f43f5e" stroke-width="2" fill="#ffffff" />
  </g>
</svg>
