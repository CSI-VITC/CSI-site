<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Tech Shield Glyph with CPU Center -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Shield Outline -->
    <path d="M 32 30 C 44 27, 56 27, 68 30 C 68 47, 63 62, 50 74 C 37 62, 32 47, 32 30 Z" />
    
    <!-- Central CPU chip -->
    <rect x="43" y="42" width="14" height="14" rx="2" stroke="#00f2fe" stroke-width="2" />
    
    <!-- CPU Connectors -->
    <path d="M 50 36 V 42" stroke="#00f2fe" />
    <path d="M 50 56 V 62" stroke="#00f2fe" />
    <path d="M 37 49 H 43" stroke="#00f2fe" />
    <path d="M 57 49 H 63" stroke="#00f2fe" />
  </g>
</svg>
