<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="dropShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Base Clay Plate -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#clayGrad)" filter="url(#dropShadow)" />
  <!-- Inset Highlight -->
  <rect x="6" y="6" width="88" height="88" rx="21" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.45" />
  <!-- Outer Bevel Shadow -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="none" stroke="#000000" stroke-width="3.5" opacity="0.15" />

  <!-- Drawing content -->
  <circle cx="30" cy="30" r="6" fill="#334155" opacity="0.2" />
  <circle cx="50" cy="30" r="6" fill="#334155" opacity="0.2" />
  <circle cx="70" cy="30" r="6" fill="#334155" opacity="0.2" />
  <circle cx="30" cy="50" r="6" fill="#334155" opacity="0.2" />
  <circle cx="50" cy="50" r="6" fill="#334155" opacity="0.2" />
  <circle cx="70" cy="50" r="6" fill="#334155" opacity="0.2" />
  <circle cx="30" cy="70" r="6" fill="#334155" opacity="0.2" />
  <circle cx="50" cy="70" r="6" fill="#334155" opacity="0.2" />
  <circle cx="70" cy="70" r="6" fill="#334155" opacity="0.2" />

  <circle cx="30" cy="30" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="30" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="70" cy="30" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

  <circle cx="30" cy="50" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="50" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="70" cy="50" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

  <circle cx="30" cy="70" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="70" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <circle cx="70" cy="70" r="6" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

  <circle cx="30" cy="30" r="1.8" fill="#0f172a" />
  <circle cx="50" cy="30" r="1.8" fill="#0f172a" />
  <circle cx="70" cy="30" r="1.8" fill="#0f172a" />
  <circle cx="30" cy="50" r="1.8" fill="#0f172a" />
  <circle cx="50" cy="50" r="1.8" fill="#0f172a" />
  <circle cx="70" cy="50" r="1.8" fill="#0f172a" />
  <circle cx="30" cy="70" r="1.8" fill="#0f172a" />
  <circle cx="50" cy="70" r="1.8" fill="#0f172a" />
  <circle cx="70" cy="70" r="1.8" fill="#0f172a" />
</svg>
