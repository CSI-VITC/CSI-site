<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    <filter id="dropShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Base Clay Plate -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#clayGrad)" filter="url(#dropShadow)" />
  <!-- Inset Highlight -->
  <rect x="6" y="6" width="88" height="88" rx="21" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.45" />
  <!-- Outer Bevel Shadow -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="none" stroke="#000000" stroke-width="3.5" opacity="0.15" />

  <!-- Drawing content -->
  <rect x="17" y="32" width="66" height="40" rx="4" fill="#7e22ce" opacity="0.3" transform="translate(1, 1)" />
  <rect x="15" y="30" width="70" height="40" rx="4" fill="none" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 15 30 L 50 53 L 85 30" fill="none" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 15 70 L 42 50" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <path d="M 85 70 L 58 50" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
  <path d="M 50 56 C 50 56, 44 50, 44 46 C 44 42, 48 42, 50 44 C 52 42, 56 42, 56 46 C 56 50, 50 56, 50 56 Z" fill="#0f172a" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round" />
</svg>
