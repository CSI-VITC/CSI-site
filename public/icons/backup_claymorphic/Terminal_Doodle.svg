<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="dropShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Base Clay Plate -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#clayGrad)" filter="url(#dropShadow)" />
  <!-- Inset Highlight -->
  <rect x="6" y="6" width="88" height="88" rx="21" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.45" />
  <!-- Outer Bevel Shadow -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="none" stroke="#000000" stroke-width="3.5" opacity="0.15" />

  <!-- Drawing content -->
  <rect x="17" y="22" width="66" height="56" rx="4" fill="#047857" opacity="0.3" transform="translate(1, 1)" />
  <rect x="15" y="20" width="70" height="60" rx="4" fill="none" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 15 32 H 85" fill="none" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="23" cy="26" r="2.5" fill="#0f172a" />
  <circle cx="31" cy="26" r="2.5" fill="#0f172a" opacity="0.6" />
  <circle cx="39" cy="26" r="2.5" fill="#0f172a" opacity="0.4" />
  <path d="M 28 44 L 38 50 L 28 56" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 43 56 H 55" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />
</svg>
