<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>

  <!-- Glass Plate -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#glass)"/>
  
  <!-- Neon Border -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="none" stroke="url(#border)" stroke-width="1.8"/>

  <!-- Team Group Glyph -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Person -->
    <circle cx="36" cy="46" r="5" stroke="#ff6b6b" stroke-width="2" />
    <path d="M 24 64 C 24 56, 48 56, 48 64" stroke="#ff6b6b" stroke-width="2" />
    
    <!-- Right Person -->
    <circle cx="64" cy="46" r="5" stroke="#ff6b6b" stroke-width="2" />
    <path d="M 52 64 C 52 56, 76 56, 76 64" stroke="#ff6b6b" stroke-width="2" />
    
    <!-- Center Person (Main/Front) -->
    <circle cx="50" cy="36" r="6.5" fill="#ff6b6b" stroke="#ffffff" stroke-width="2.2" />
    <path d="M 34 56 C 34 47, 66 47, 66 56 Z" fill="#0f172a" opacity="0.3" />
    <path d="M 34 56 C 34 47, 66 47, 66 56 Z" stroke="#ffffff" stroke-width="2.5" />
  </g>
</svg>
